<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creppes Digital</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --fg: #e8e8e8;
      --dim: #555;
      --accent: #c8f542;
      --font: "Courier New", Courier, monospace;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font);
      font-size: clamp(13px, 1.6vw, 15px);
      line-height: 1.7;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: clamp(2rem, 6vw, 5rem);
      min-height: 100dvh;
    }

    header {
      display: flex;
      align-items: baseline;
      gap: 1rem;
    }

    .wordmark {
      font-size: clamp(1.1rem, 3vw, 1.4rem);
      font-weight: bold;
      letter-spacing: 0.04em;
      color: var(--fg);
      text-decoration: none;
    }

    .wordmark span {
      color: var(--accent);
    }

    main {
      margin-top: auto;
      margin-bottom: auto;
      padding: 4rem 0 2rem;
      max-width: 560px;
    }

    .tagline {
      font-size: clamp(0.85rem, 1.4vw, 0.95rem);
      color: var(--dim);
      margin-bottom: 2.4rem;
      letter-spacing: 0.02em;
    }

    .message {
      font-size: clamp(1rem, 2vw, 1.15rem);
      color: var(--fg);
      margin-bottom: 0.5rem;
    }

    .sub {
      color: var(--dim);
      font-size: clamp(0.8rem, 1.2vw, 0.88rem);
    }

    .cursor {
      display: inline-block;
      width: 0.55em;
      height: 1em;
      background: var(--accent);
      vertical-align: text-bottom;
      margin-left: 2px;
      animation: blink 1.1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    footer {
      font-size: 0.78rem;
      color: var(--dim);
      letter-spacing: 0.03em;
    }

    a { color: inherit; text-decoration: underline; text-underline-offset: 3px; }
    a:hover { color: var(--accent); }

    @media (prefers-reduced-motion: reduce) {
      .cursor { animation: none; opacity: 1; }
    }
  </style>
</head>
<body>

  <header>
    <a class="wordmark" href="/">Creppes<span>.</span>Digital</a>
  </header>

  <main>
    <p class="tagline">digital · creative · studio</p>
    <p class="message">Something is being built here.<span class="cursor"></span></p>
    <p class="sub">Check back soon.</p>
  </main>

  <footer>
    &copy;<script>document.write(new Date().getFullYear())</script> Creppes Digital
  </footer>

</body>
</html>

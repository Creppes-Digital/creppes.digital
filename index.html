<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary SEO -->
  <title>Creppes Digital — Secure Digital Marketing Services</title>
  <meta name="description" content="Secure digital marketing services for all. Landing pages, digital marketing campaigns, and domain management — built to grow your online presence." />
  <meta name="keywords" content="digital marketing, landing pages, marketing campaigns, domain management, secure digital services" />
  <meta name="author" content="Creppes Digital" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://creppes.digital/" />

  <!-- Open Graph (Facebook, LinkedIn previews) -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://creppes.digital/" />
  <meta property="og:title" content="Creppes Digital — Secure Digital Marketing Services" />
  <meta property="og:description" content="Secure digital marketing services for all. Landing pages, digital marketing campaigns, and domain management — built to grow your online presence." />
  <meta property="og:site_name" content="Creppes Digital" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Creppes Digital — Secure Digital Marketing Services" />
  <meta name="twitter:description" content="Secure digital marketing services for all. Landing pages, digital marketing campaigns, and domain management." />

  <!-- Structured Data (JSON-LD) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Creppes Digital",
    "url": "https://creppes.digital",
    "description": "Secure digital marketing services for all. Landing pages, digital marketing campaigns, and domain management.",
    "serviceType": ["Digital Marketing", "Landing Pages", "Domain Management"]
  }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --fg: #e8e8e8;
      --dim: #555;
      --accent: #c8f542;
      --font: "Courier New", Courier, monospace;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font);
      font-size: clamp(13px, 1.6vw, 15px);
      line-height: 1.7;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: clamp(2rem, 6vw, 5rem);
      min-height: 100dvh;
    }

    header {
      display: flex;
      align-items: baseline;
      gap: 1rem;
    }

    .wordmark {
      font-size: clamp(1.1rem, 3vw, 1.4rem);
      font-weight: bold;
      letter-spacing: 0.04em;
      color: var(--fg);
      text-decoration: none;
    }

    .wordmark span {
      color: var(--accent);
    }

    main {
      margin-top: auto;
      margin-bottom: auto;
      padding: 4rem 0 2rem;
      max-width: 560px;
    }

    .tagline {
      font-size: clamp(0.85rem, 1.4vw, 0.95rem);
      color: var(--dim);
      margin-bottom: 2.4rem;
      letter-spacing: 0.02em;
    }

    .message {
      font-size: clamp(1rem, 2vw, 1.15rem);
      color: var(--fg);
      margin-bottom: 0.5rem;
    }

    .sub {
      color: var(--dim);
      font-size: clamp(0.8rem, 1.2vw, 0.88rem);
    }

    .cursor {
      display: inline-block;
      width: 0.55em;
      height: 1em;
      background: var(--accent);
      vertical-align: text-bottom;
      margin-left: 2px;
      animation: blink 1.1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    footer {
      font-size: 0.78rem;
      color: var(--dim);
      letter-spacing: 0.03em;
    }

    a { color: inherit; text-decoration: underline; text-underline-offset: 3px; }
    a:hover { color: var(--accent); }

    @media (prefers-reduced-motion: reduce) {
      .cursor { animation: none; opacity: 1; }
    }
  </style>
</head>
<body>

  <header>
    <a class="wordmark" href="/">Creppes<span>.</span>Digital</a>
  </header>

  <main>
    <p class="tagline">landing pages · marketing campaigns · domain management</p>
    <p class="message">Something is being built here.<span class="cursor"></span></p>
    <p class="sub">Secure digital marketing services for all. Coming soon.</p>
  </main>

  <footer>
    &copy;<script>document.write(new Date().getFullYear())</script> Creppes Digital
  </footer>

</body>
</html>
